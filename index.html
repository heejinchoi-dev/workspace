<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Labs Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body{font-family:'Inter',sans-serif;color:#37352F;background:#f3f4f6;margin:0}
    .r35{border-radius:35px!important} .r24{border-radius:24px!important} .r20{border-radius:20px!important}
    .card-shadow{box-shadow:0 10px 25px -5px rgba(0,0,0,.05)}
    .card-hover{transition:transform .15s ease,box-shadow .15s ease}
    .card-hover:hover{transform:translateY(-2px)}
    .modal-overlay{background:rgba(0,0,0,.5);backdrop-filter:blur(8px);position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center}
    .fade-in{animation:fadeIn .3s ease-out} @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .toast-show{opacity:1!important;transform:translate(-50%,0)!important}
    .progress-bar{height:8px;border-radius:99px;background:#e5e7eb;overflow:hidden}
    .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#3b82f6,#6366f1);transition:width .4s ease}
    .hide-scrollbar::-webkit-scrollbar{display:none}
    .hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    .skeleton{background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .sidebar-item{cursor:pointer;transition:all .15s ease}
    .sidebar-item:hover{background:#f3f4f6}
    .sidebar-item.active{background:#e0e7ff;color:#4338ca;font-weight:700}
    .sidebar-badge{background:#ef4444;color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:99px;margin-left:auto}
    .badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:800}
    .badge-approved{background:#dcfce7;color:#16a34a}
    .badge-rejected{background:#fee2e2;color:#dc2626}
    .badge-withdrawn{background:#f3f4f6;color:#6b7280}
    .badge-pending{background:#dbeafe;color:#2563eb}
    .upload-zone{border:2px dashed #d1d5db;cursor:pointer;transition:border-color .2s}
    .upload-zone:hover{border-color:#3b82f6}
    .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" class="fixed inset-0 bg-gradient-to-br from-indigo-900 to-blue-800 flex items-center justify-center z-[200]">
  <div class="bg-white r35 p-16 shadow-2xl text-center w-full max-w-sm fade-in">
    <img src="https://i.imgur.com/gzXQ8nD.png" alt="Logo" class="h-12 mx-auto mb-8 object-contain">
    <h1 class="text-2xl font-black text-gray-800 mb-2">Circular Labs</h1>
    <p class="text-sm text-gray-400 mb-10">워크스페이스 로그인</p>
    <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-blue-400 text-gray-700 font-bold py-4 r24 transition shadow-sm">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Google 로그인
    </button>
    <p id="login-error" class="text-red-500 text-xs font-bold mt-4 hidden">허용되지 않은 계정입니다.</p>
  </div>
</div>

<!-- 토스트 -->
<div id="toast-msg" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 translate-y-4 bg-gray-900 text-white px-8 py-4 r35 shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-[100] font-bold text-sm flex items-center gap-3">
  <i class="ri-notification-3-line text-xl"></i><span id="toast-text"></span>
</div>

<!-- 앱 본체 -->
<div id="app" class="hidden h-screen overflow-hidden">
  <!-- 사이드바 -->
  <aside class="w-72 bg-[#fbfbfa] border-r border-gray-200 flex flex-col p-6 z-10 overflow-y-auto hide-scrollbar flex-shrink-0">
    <div class="flex items-center justify-center mb-10 h-12">
      <img src="https://i.imgur.com/gzXQ8nD.png" alt="Logo" class="h-full object-contain max-w-full">
    </div>
    <nav class="flex-1 space-y-2 text-sm font-medium text-gray-600">
      <div onclick="showTab('home')"      data-tab="home"      class="sidebar-item flex items-center gap-4 p-3.5 r24 active"><i class="ri-home-smile-2-fill text-xl"></i> 대시보드</div>
      <div class="my-3 border-t border-gray-200"></div>
      <div onclick="showTab('calendar')"  data-tab="calendar"  class="sidebar-item flex items-center gap-4 p-3.5 r24 text-rose-600"><i class="ri-calendar-todo-fill text-xl"></i> 일정 및 할 일</div>
      <div onclick="showTab('dev')"       data-tab="dev"       class="sidebar-item flex items-center gap-4 p-3.5 r24 text-blue-600"><i class="ri-macbook-fill text-xl"></i> 개발 프로젝트</div>
      <div onclick="showTab('crm')"       data-tab="crm"       class="sidebar-item flex items-center gap-4 p-3.5 r24 text-emerald-600"><i class="ri-briefcase-4-fill text-xl"></i> 영업 파이프라인</div>
      <div onclick="showTab('cs')"        data-tab="cs"        class="sidebar-item flex items-center gap-4 p-3.5 r24 text-orange-500"><i class="ri-customer-service-2-fill text-xl"></i> CS 고객지원</div>
      <div class="my-3 border-t border-gray-200"></div>
      <div onclick="showTab('approval')"  data-tab="approval"  class="sidebar-item flex items-center gap-4 p-3.5 r24 text-gray-800"><i class="ri-bank-card-fill text-xl"></i> 지출/결재 <span id="badge-appr" class="sidebar-badge hidden">0</span></div>
      <div onclick="showTab('vault')"     data-tab="vault"     class="sidebar-item flex items-center gap-4 p-3.5 r24 text-amber-600"><i class="ri-shield-keyhole-fill text-xl"></i> 팀 보안 금고</div>
      <div onclick="showTab('wiki')"      data-tab="wiki"      class="sidebar-item flex items-center gap-4 p-3.5 r24 text-gray-800"><i class="ri-book-read-fill text-xl"></i> 사내 위키</div>
      <div onclick="showTab('leaves')"    data-tab="leaves"    class="sidebar-item flex items-center gap-4 p-3.5 r24 text-purple-600"><i class="ri-flight-takeoff-fill text-xl"></i> 휴가/근태 <span id="badge-leave" class="sidebar-badge hidden">0</span></div>
      <div onclick="showTab('directory')" data-tab="directory" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-teal-600"><i class="ri-group-fill text-xl"></i> 조직도</div>
      <div id="admin-menu" class="hidden">
        <div class="my-3 border-t border-gray-200"></div>
        <div onclick="showTab('admin')"   data-tab="admin"     class="sidebar-item flex items-center gap-4 p-3.5 r24 text-red-600"><i class="ri-settings-3-fill text-xl"></i> 관리자 설정</div>
      </div>
    </nav>
    <div class="mt-6 p-5 bg-white r24 card-shadow text-xs">
      <div class="font-black text-sm mb-1 text-gray-800" id="sidebar-name"></div>
      <div class="text-gray-400 truncate mb-3" id="sidebar-email"></div>
      <button onclick="openNotifModal()" class="w-full flex items-center justify-between bg-gray-50 hover:bg-gray-100 transition p-3 r20 border border-gray-200 mb-2">
        <span class="flex items-center gap-2 text-gray-600 font-bold text-xs"><i class="ri-notification-3-fill text-blue-500 text-base"></i> 알림 센터</span>
        <span id="notif-badge" class="hidden bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">0</span>
      </button>
      <button onclick="signOut()" class="w-full flex items-center justify-center gap-2 bg-gray-50 hover:bg-red-50 hover:text-red-600 transition p-3 r20 border border-gray-200 text-gray-500 font-bold text-xs">
        <i class="ri-logout-box-line"></i> 로그아웃
      </button>
    </div>
  </aside>

  <!-- 메인 -->
  <main id="content" class="flex-1 overflow-y-auto bg-[#f3f4f6] p-8 relative hide-scrollbar">
    <div id="tab-home"      class="fade-in max-w-6xl mx-auto"></div>
    <div id="tab-calendar"  class="fade-in max-w-7xl mx-auto hidden h-full flex flex-col"></div>
    <div id="tab-dev"       class="fade-in max-w-7xl mx-auto hidden flex flex-col" style="height:calc(100vh - 4rem)"></div>
    <div id="tab-crm"       class="fade-in max-w-7xl mx-auto hidden flex flex-col" style="height:calc(100vh - 4rem)"></div>
    <div id="tab-cs"        class="fade-in max-w-6xl mx-auto hidden flex flex-col" style="height:calc(100vh - 4rem)"></div>
    <div id="tab-approval"  class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-vault"     class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-wiki"      class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-leaves"    class="fade-in max-w-5xl mx-auto hidden"></div>
    <div id="tab-directory" class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-admin"     class="fade-in max-w-5xl mx-auto hidden"></div>
  </main>
</div>

<!-- 모달 컨테이너 -->
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════
//  Firebase 설정 (단일)
// ═══════════════════════════════════════════════
var firebaseConfig = {
  apiKey: "AIzaSyCmeGcCHO5K-jKu4UApMo_CxLhhDuzVLlc",
  authDomain: "circularlabs-gw.firebaseapp.com",
  databaseURL: "https://circularlabs-gw-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "circularlabs-gw",
  storageBucket: "circularlabs-gw.firebasestorage.app",
  messagingSenderId: "995341939477",
  appId: "1:995341939477:web:543ebebe0a2af4ca14ef1c",
  measurementId: "G-GYKFT9X5SD"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db   = firebase.database();

// ═══════════════════════════════════════════════
//  전역 변수
// ═══════════════════════════════════════════════
var USER   = null;
var CACHE  = {
  tasks:[], devProjects:[], sprints:[], crm:[], cs:[],
  schedules:[], approval:[], leaves:[], vault:[], comments:{},
  members:[], wiki:[], leaveInfo:{total:15, used:0, remain:15}
};
var devView = 'board';
var calendarObj = null;
var confirmCb   = null;
var activeNoticeId = null;
var chartCRM = null, chartTasks = null;

// ═══════════════════════════════════════════════
//  유틸
// ═══════════════════════════════════════════════
function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function nowFmt() { var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
function pad(n) { return String(n).padStart(2,'0'); }
function fmtDT(ts) { if(!ts) return ''; var d=new Date(Number(ts)); return pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
function showToast(msg) { var t=document.getElementById('toast-msg'); document.getElementById('toast-text').innerText=msg; t.classList.add('toast-show'); setTimeout(function(){ t.classList.remove('toast-show'); },3000); }
function openModal(id) { var e=document.getElementById(id); if(e) e.classList.remove('hidden'); }
function closeModal(id) { var e=document.getElementById(id); if(e) e.classList.add('hidden'); }
function statusBadge(s) {
  if(['승인','1차 승인','최종 승인','계약성공(Won)','완료','배포완료'].indexOf(s)>-1) return '<span class="badge badge-approved">'+s+'</span>';
  if(s==='반려') return '<span class="badge badge-rejected">'+s+'</span>';
  if(['철회','취소','보류'].indexOf(s)>-1) return '<span class="badge badge-withdrawn">'+s+'</span>';
  return '<span class="badge badge-pending">'+s+'</span>';
}
function getMemberName(email) { if(!email) return '(미지정)'; var m=CACHE.members.find(function(x){ return x.email&&x.email.toLowerCase()===String(email).toLowerCase(); }); return m?m.name:String(email).split('@')[0]; }
function parseNode(obj) { if(!obj) return []; return Object.keys(obj).map(function(k){ return Object.assign({id:k},obj[k]); }); }
function openCustomConfirm(title, desc, cb) {
  document.getElementById('cc-title').innerText = title;
  document.getElementById('cc-desc').innerText  = desc;
  confirmCb = cb;
  document.getElementById('cc-ok').onclick = function() { if(confirmCb){ confirmCb(); closeModal('custom-confirm-modal'); } };
  openModal('custom-confirm-modal');
}
function populateAssignees(cId, sel) {
  var el=document.getElementById(cId); if(!el) return;
  var s=sel?sel.split(',').map(function(x){return x.trim().toLowerCase();}):[];
  el.innerHTML=CACHE.members.map(function(m){ return '<label class="flex items-center gap-3 text-sm p-2.5 hover:bg-gray-100 cursor-pointer r20 transition"><input type="checkbox" class="'+cId+'-cb w-5 h-5 rounded accent-blue-600" value="'+m.email+'" '+(s.indexOf(m.email.toLowerCase())>-1?'checked':'')+'> <span class="font-bold text-gray-700">'+m.name+' <span class="text-[10px] text-gray-400">('+m.dept+')</span></span></label>'; }).join('');
}
function getChecked(cId) { return Array.from(document.querySelectorAll('.'+cId+'-cb:checked')).map(function(c){ return c.value; }).join(','); }

// ═══════════════════════════════════════════════
//  Firebase DB 헬퍼
// ═══════════════════════════════════════════════
var FB = {
  get: function(path, cb) {
    db.ref(path).once('value', function(snap){ cb(null, snap.val()); }, function(err){ cb(err, null); });
  },
  set: function(path, data) { db.ref(path).set(data); },
  patch: function(path, data) { db.ref(path).update(data); },
  push: function(path, data, cb) {
    var ref = db.ref(path).push(data);
    if(cb) cb(ref.key);
  },
  remove: function(path) { db.ref(path).remove(); },
  listen: function(path, cb) {
    db.ref(path).on('value', function(snap){ cb(snap.val()); });
  },
  unlisten: function(path) { db.ref(path).off(); }
};

// ═══════════════════════════════════════════════
//  인증
// ═══════════════════════════════════════════════
auth.onAuthStateChanged(function(firebaseUser) {
  if(firebaseUser) {
    db.ref('members').once('value', function(snap) {
      var members = snap.val();
      var memberList = members ? Object.keys(members).map(function(k){ return Object.assign({id:k}, members[k]); }) : [];
      var matched = memberList.find(function(m){ return m.email && m.email.toLowerCase() === firebaseUser.email.toLowerCase(); });
      if(matched) {
        USER = {
          email: firebaseUser.email,
          name: matched.name || firebaseUser.displayName || firebaseUser.email.split('@')[0],
          dept: matched.dept || '',
          role: matched.role || 'MEMBER',
          leaveTotal: Number(matched.leaveTotal)||15,
          phone: matched.phone||''
        };
        CACHE.members = memberList;
        document.getElementById('login-screen').classList.add('hidden');
        var appEl = document.getElementById('app');
        appEl.classList.remove('hidden');
        appEl.classList.add('flex');
        document.getElementById('sidebar-name').innerText = USER.name;
        document.getElementById('sidebar-email').innerText = USER.email;
        if(USER.role==='ADMIN') document.getElementById('admin-menu').classList.remove('hidden');
        initApp();
      } else {
        document.getElementById('login-error').classList.remove('hidden');
        setTimeout(function(){ auth.signOut(); }, 3000);
      }
    });
  } else {
    document.getElementById('app').classList.add('hidden');
    document.getElementById('app').classList.remove('flex');
    document.getElementById('login-screen').classList.remove('hidden');
  }
});

document.getElementById('google-login-btn').onclick = function() {
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: 'circularlabs.co.kr' });
  auth.signInWithPopup(provider).catch(function(err){
    console.error(err);
    showToast('로그인 실패: ' + err.message);
  });
};

function signOut() {
  openCustomConfirm('로그아웃', '로그아웃 하시겠습니까?', function() {
    auth.signOut();
  });
}

// ═══════════════════════════════════════════════
//  앱 초기화
// ═══════════════════════════════════════════════
function initApp() {
  showSkeleton();
  var nodes = ['tasks','devProjects','sprints','crm','cs','schedules','approvals','leaves','vault','comments','wiki','notices'];
  var results = {};
  var idx = 0;

  function next() {
    if(idx >= nodes.length) { processData(results); return; }
    var node = nodes[idx++];
    FB.get(node, function(err, data) {
      results[node] = data;
      next();
    });
  }
  next();
}

function showSkeleton() {
  document.getElementById('tab-home').innerHTML =
    '<div class="mb-8"><div class="skeleton h-10 w-64 r24 mb-2"></div></div>' +
    '<div class="grid grid-cols-4 gap-6 mb-8">' + Array(4).fill('<div class="skeleton h-32 r35"></div>').join('') + '</div>' +
    '<div class="grid grid-cols-2 gap-8">' + Array(2).fill('<div class="skeleton h-64 r35"></div>').join('') + '</div>';
}

function processData(results) {
  var now = Date.now();
  CACHE.tasks       = parseNode(results.tasks).filter(function(t){ return !(t.status==='Done'&&(now-(parseInt(t.timestamp)||now))>30*86400000); });
  CACHE.devProjects = parseNode(results.devProjects);
  CACHE.sprints     = parseNode(results.sprints);
  CACHE.crm         = parseNode(results.crm);
  CACHE.cs          = parseNode(results.cs);
  CACHE.schedules   = parseNode(results.schedules);
  CACHE.approval    = parseNode(results.approvals);
  CACHE.leaves      = parseNode(results.leaves);
  CACHE.comments    = results.comments || {};
  CACHE.wiki        = parseNode(results.wiki);

  CACHE.vault = parseNode(results.vault).filter(function(v) {
    if(USER.role==='ADMIN'||v.creator===USER.email||v.visibility==='ALL') return true;
    if(v.visibility==='PRIVATE') return false;
    return (v.visibility||'').indexOf(USER.dept)>-1||(v.visibility||'').indexOf(USER.email)>-1;
  }).map(function(v){ return Object.assign({},v,{password:'••••••••'}); });

  var used=0;
  CACHE.leaves.filter(function(l){ return l.applicant&&l.applicant.toLowerCase()===USER.email&&l.status==='승인'; })
    .forEach(function(l){ if(l.type==='연차') used+=1; else if(l.type==='반차') used+=0.5; });
  CACHE.leaveInfo = {total:USER.leaveTotal, used:used, remain:USER.leaveTotal-used};

  var notices = parseNode(results.notices);
  if(notices.length>0) {
    var latest = notices[notices.length-1];
    if(latest && latest.content) {
      activeNoticeId = latest.id;
      showNoticePopup(latest.content);
    }
  }

  updateBadges();
  initConfirmModal();
  showTab('home');
  showToast('✅ 로드 완료!');
  setupRealtimeListeners();
}

function setupRealtimeListeners() {
  FB.listen('approvals', function(data) {
    CACHE.approval = parseNode(data);
    updateBadges();
    var el = document.getElementById('tab-approval');
    if(el && !el.classList.contains('hidden')) renderApproval();
  });
  FB.listen('leaves', function(data) {
    CACHE.leaves = parseNode(data);
    var used=0;
    CACHE.leaves.filter(function(l){ return l.applicant&&l.applicant.toLowerCase()===USER.email&&l.status==='승인'; })
      .forEach(function(l){ if(l.type==='연차') used+=1; else if(l.type==='반차') used+=0.5; });
    CACHE.leaveInfo={total:USER.leaveTotal,used:used,remain:USER.leaveTotal-used};
    updateBadges();
  });
}

// ═══════════════════════════════════════════════
//  탭 전환
// ═══════════════════════════════════════════════
function showTab(name) {
  document.querySelectorAll('[id^="tab-"]').forEach(function(s){ s.classList.add('hidden'); });
  document.querySelectorAll('.sidebar-item').forEach(function(i){ i.classList.remove('active'); });
  var sec = document.getElementById('tab-'+name);
  if(!sec) return;
  sec.classList.remove('hidden');
  var nav = document.querySelector('[data-tab="'+name+'"]');
  if(nav) nav.classList.add('active');
  var renders = {
    home: renderDashboard, calendar: renderCalendar,
    dev: function(){ setDevView(devView); }, crm: filterCRM, cs: filterCS,
    approval: renderApproval, vault: renderVault, wiki: renderWiki,
    leaves: renderLeaves, directory: renderDirectory, admin: renderAdmin
  };
  if(renders[name]) renders[name]();
}

function updateBadges() {
  var ac=CACHE.approval.filter(function(d){ return ((d.approver1||'').toLowerCase()===USER.email&&d.status==='대기')||((d.approver2||'').toLowerCase()===USER.email&&d.status==='1차 승인'); }).length;

}

function buildNotifications() {
  var notes=[];
  var today=new Date(); today.setHours(0,0,0,0);
  var todayStr=new Date().toISOString().slice(0,10);
  CACHE.approval.filter(function(d){ return ((d.approver1||'').toLowerCase()===USER.email&&d.status==='대기')||((d.approver2||'').toLowerCase()===USER.email&&d.status==='1차 승인'); })
    .forEach(function(d){ notes.push({icon:'ri-bank-card-fill',color:'text-blue-500',bg:'bg-blue-50',msg:'결재 대기: <b>'+esc(d.reason)+'</b> ₩'+Number(d.amount).toLocaleString(),action:function(){ closeModal('notif-modal'); showTab('approval'); }}); });
  CACHE.leaves.filter(function(d){ return (d.approver1||'').toLowerCase()===USER.email&&d.status==='대기'; })
    .forEach(function(d){ notes.push({icon:'ri-flight-takeoff-fill',color:'text-purple-500',bg:'bg-purple-50',msg:'휴가 결재 대기: <b>'+d.applicantName+'</b>',action:function(){ closeModal('notif-modal'); showTab('leaves'); }}); });
  CACHE.tasks.filter(function(t){ if(!t.deadline||t.status==='Done') return false; var diff=Math.ceil((new Date(t.deadline)-today)/86400000); return diff<=0&&(t.assignees||'').toLowerCase().indexOf(USER.email)>-1; })
    .forEach(function(t){ notes.push({icon:'ri-alarm-warning-fill',color:'text-red-500',bg:'bg-red-50',msg:'오늘 마감: <b>'+esc(t.title)+'</b>',action:function(){ closeModal('notif-modal'); showTab('calendar'); }}); });
  CACHE.crm.filter(function(d){ return d.nextActionDate&&d.nextActionDate<=todayStr&&d.status!=='계약성공(Won)'; })
    .forEach(function(d){ notes.push({icon:'ri-briefcase-4-fill',color:'text-emerald-500',bg:'bg-emerald-50',msg:'팔로업 필요: <b>'+esc(d.company)+'</b>',action:function(){ closeModal('notif-modal'); showTab('crm'); }}); });
  return notes;
}

function openNotifModal() {
  var notes=buildNotifications();
  renderModalRoot('notif-modal',
    '<div class="bg-white r35 w-full max-w-md p-10 shadow-2xl fade-in relative max-h-[85vh] flex flex-col">' +
    '<button onclick="closeModal(\'notif-modal\')" class="absolute top-6 right-6 text-gray-400 hover:text-black"><i class="ri-close-line text-3xl"></i></button>' +
    '<h2 class="text-2xl font-black mb-6 text-gray-800"><i class="ri-notification-3-fill text-blue-500 mr-2"></i> 알림 센터</h2>' +
    '<div class="flex-1 overflow-y-auto hide-scrollbar">' +
    (notes.length===0 ? '<p class="text-sm text-gray-400 font-bold text-center py-10">새로운 알림이 없습니다 🎉</p>' :
      notes.map(function(n,i){ return '<div id="notif-'+i+'" class="flex items-start gap-4 p-4 '+n.bg+' r24 cursor-pointer hover:opacity-80 transition mb-3"><i class="'+n.icon+' '+n.color+' text-xl shrink-0 mt-0.5"></i><p class="text-sm text-gray-700">'+n.msg+'</p></div>'; }).join('')) +
    '</div></div>');
  openModal('notif-modal');
  notes.forEach(function(n,i){ var el=document.getElementById('notif-'+i); if(el) el.onclick=n.action; });
}

function refreshNotifBadge() {
  var c=buildNotifications().length, b=document.getElementById('notif-badge');
  if(b){b.innerText=c;b.classList.toggle('hidden',c===0);}
}

function renderDashCharts() {
  var crmC={'잠재고객':CACHE.crm.filter(function(c){ return (c.status||'').indexOf('Lead')>-1; }).length,'미팅/연락':CACHE.crm.filter(function(c){ return (c.status||'').indexOf('Contact')>-1; }).length,'제안/견적':CACHE.crm.filter(function(c){ return (c.status||'').indexOf('Proposal')>-1; }).length,'계약성공':CACHE.crm.filter(function(c){ return (c.status||'').indexOf('Won')>-1; }).length};
  var cCtx=document.getElementById('chart-crm');
  if(cCtx){if(chartCRM)chartCRM.destroy();chartCRM=new Chart(cCtx,{type:'doughnut',data:{labels:Object.keys(crmC),datasets:[{data:Object.values(crmC),backgroundColor:['#6b7280','#3b82f6','#8b5cf6','#10b981'],borderWidth:0}]},options:{cutout:'68%',plugins:{legend:{display:false}},animation:{duration:400}}});}
  var leg=document.getElementById('chart-crm-legend');
  if(leg){var colors=['#6b7280','#3b82f6','#8b5cf6','#10b981'];leg.innerHTML=Object.entries(crmC).map(function(e,i){ return '<div class="flex justify-between text-xs"><span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full inline-block" style="background:'+colors[i]+'"></span><span class="text-gray-600 font-bold">'+e[0]+'</span></span><span class="font-black text-gray-800">'+e[1]+'건</span></div>'; }).join('');}
  var mo=new Date().toISOString().slice(0,7);
  var mt=CACHE.tasks.filter(function(t){ return (t.deadline||'').startsWith(mo); });
  var bS={Todo:mt.filter(function(t){ return t.status==='Todo'; }).length,'In Progress':mt.filter(function(t){ return t.status==='In Progress'; }).length,Done:mt.filter(function(t){ return t.status==='Done'; }).length};
  var tCtx=document.getElementById('chart-tasks');
  if(tCtx){if(chartTasks)chartTasks.destroy();chartTasks=new Chart(tCtx,{type:'bar',data:{labels:Object.keys(bS),datasets:[{data:Object.values(bS),backgroundColor:['#e5e7eb','#3b82f6','#10b981'],borderRadius:8,borderWidth:0}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'#f3f4f6'}},x:{grid:{display:false}}},animation:{duration:400}}});}
  var tleg=document.getElementById('chart-tasks-legend');
  if(tleg){var tot=Object.values(bS).reduce(function(a,b){ return a+b; },0);tleg.innerHTML='<p class="text-xs text-gray-500 font-bold text-center">총 <b class="text-gray-800">'+tot+'건</b> · 완료율 <b class="text-green-600">'+(tot?Math.round(bS.Done/tot*100):0)+'%</b></p>';}
}

function renderTodoList() {
  var el=document.getElementById('todo-list'); if(!el) return;
  var myTasks=CACHE.tasks.filter(function(t){ return (t.assignees||'').toLowerCase().indexOf(USER.email)>-1&&t.project==='일반'&&t.status!=='Done'; });
  el.innerHTML=myTasks.length===0?'<p class="text-xs text-gray-400 font-bold text-center py-4">할 일이 없습니다.</p>':
    myTasks.map(function(t){ return '<div class="flex items-center gap-3 p-3 bg-gray-50 r20 group hover:bg-gray-100 transition"><input type="checkbox" class="w-5 h-5 rounded accent-blue-600 cursor-pointer shrink-0" '+(t.status==='Done'?'checked':'')+' onchange="toggleTodo(\''+t.id+'\',this.checked)"><span class="flex-1 text-sm font-bold '+(t.status==='Done'?'line-through text-gray-400':'text-gray-700')+'">'+esc(t.title)+'</span><button onclick="deleteTodo(\''+t.id+'\')" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition"><i class="ri-delete-bin-line"></i></button></div>'; }).join('');
}

function addTodoTask() {
  var input=document.getElementById('todo-input'); var title=input?input.value.trim():''; if(!title) return;
  input.value='';
  var id=genId();
  var obj={id:id,project:'일반',category:'할일',title:title,assignees:USER.email,priority:'Medium',deadline:'',content:'',status:'Todo',creator:USER.email,checklist:[],timestamp:Date.now()};
  CACHE.tasks.push(obj); renderTodoList();
  FB.set('tasks/'+id, obj);
}
function toggleTodo(id, done) {
  var ns=done?'Done':'Todo'; var t=CACHE.tasks.find(function(x){ return x.id===id; }); if(t) t.status=ns;
  renderTodoList(); FB.patch('tasks/'+id,{status:ns});
}
function deleteTodo(id) {
  CACHE.tasks=CACHE.tasks.filter(function(x){ return x.id!==id; }); renderTodoList(); FB.remove('tasks/'+id);
}

function renderFullCalendar() {
  var el=document.getElementById('main-calendar-element'); if(!el) return;
  var events=[];
  CACHE.schedules.forEach(function(s){ events.push({id:s.id,title:(s.type?'['+s.type+'] ':'')+s.title,start:s.start,end:s.end||s.start,color:'#f43f5e',extendedProps:{type:'schedule',data:s}}); });
  CACHE.tasks.filter(function(t){ return t.deadline; }).forEach(function(t){ events.push({id:'task_'+t.id,title:'✅ '+t.title,start:t.deadline,color:t.status==='Done'?'#9ca3af':'#3b82f6',extendedProps:{type:'task',data:t}}); });
  if(calendarObj){calendarObj.destroy();calendarObj=null;}
  calendarObj=new FullCalendar.Calendar(el,{initialView:'dayGridMonth',locale:'ko',height:'100%',headerToolbar:{left:'prev,next today',center:'title',right:'dayGridMonth,timeGridWeek,listWeek'},events:events,eventClick:function(info){ var p=info.event.extendedProps; if(p.type==='schedule') openScheduleModal(p.data); }});
  calendarObj.render();
}

function submitSchedule() {
  var id=document.getElementById('sch-edit-id').value;
  var title=document.getElementById('sch-title').value.trim(); if(!title) return showToast("제목을 입력하세요.");
  var obj={title:title,start:document.getElementById('sch-start').value,end:document.getElementById('sch-end').value||document.getElementById('sch-start').value,type:document.getElementById('sch-type').value,assignees:getChecked('sch-assignees-container'),note:document.getElementById('sch-note').value,creator:USER.email};
  if(id){obj.id=id;var idx=CACHE.schedules.findIndex(function(x){return x.id===id;});if(idx>-1)Object.assign(CACHE.schedules[idx],obj);FB.patch('schedules/'+id,obj);}
  else{obj.id=genId();CACHE.schedules.push(obj);FB.set('schedules/'+obj.id,obj);}
  closeModal('schedule-modal'); renderFullCalendar(); showToast(id?"일정 수정 완료":"일정 등록 완료");
}
function deleteScheduleAction(id) {
  openCustomConfirm("일정 삭제","이 일정을 삭제할까요?",function(){CACHE.schedules=CACHE.schedules.filter(function(x){return x.id!==id;});FB.remove('schedules/'+id);closeModal('schedule-modal');renderFullCalendar();showToast("삭제 완료");});
}

var DEV_STATUS_META={'기획중':{dot:'bg-yellow-400',badge:'bg-yellow-100 text-yellow-700'},'개발중':{dot:'bg-blue-500',badge:'bg-blue-100 text-blue-700'},'QA/테스트':{dot:'bg-purple-500',badge:'bg-purple-100 text-purple-700'},'배포완료':{dot:'bg-green-500',badge:'bg-green-100 text-green-700'},'보류':{dot:'bg-gray-300',badge:'bg-gray-100 text-gray-500'}};
var PRIORITY_META={P1:{bg:'bg-red-100',text:'text-red-600',icon:'ri-arrow-up-double-fill',tip:'긴급'},P2:{bg:'bg-orange-100',text:'text-orange-500',icon:'ri-arrow-up-fill',tip:'높음'},P3:{bg:'bg-blue-100',text:'text-blue-500',icon:'ri-arrow-right-fill',tip:'보통'},P4:{bg:'bg-gray-100',text:'text-gray-400',icon:'ri-arrow-down-fill',tip:'낮음'}};
var TAG_COLORS=['bg-pink-100 text-pink-700','bg-violet-100 text-violet-700','bg-sky-100 text-sky-700','bg-teal-100 text-teal-700','bg-lime-100 text-lime-700','bg-amber-100 text-amber-700'];
function tagColor(t){var h=0;for(var i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))%TAG_COLORS.length;return TAG_COLORS[h];}
function tagHtml(tags){return (tags||'').split(',').map(function(t){return t.trim();}).filter(Boolean).map(function(t){return '<span class="text-[10px] font-black px-2 py-0.5 r20 '+tagColor(t)+'">'+esc(t)+'</span>';}).join('');}
function priorityHtml(p,size){var m=PRIORITY_META[p];if(!m)return'';var sz=size==='md'?'text-xs px-3 py-1':'text-[10px] px-2 py-0.5';return'<span title="'+m.tip+'" class="'+sz+' r20 font-black flex items-center gap-1 '+m.bg+' '+m.text+'"><i class="'+m.icon+'"></i>'+p+'</span>';}
function avatarHtml(emails,max){max=max||4;var colors=['bg-blue-500','bg-purple-500','bg-emerald-500','bg-rose-500','bg-amber-500'];var list=(emails||'').split(',').filter(Boolean);return list.slice(0,max).map(function(e,i){var n=getMemberName(e.trim());return'<div title="'+n+'" class="w-7 h-7 rounded-full '+colors[i%colors.length]+' flex items-center justify-center text-white text-[10px] font-black border-2 border-white -ml-1 first:ml-0 shadow-sm">'+(n[0]||'?')+'</div>';}).join('')+(list.length>max?'<div class="w-7 h-7 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 text-[10px] font-black border-2 border-white -ml-1">+'+(list.length-max)+'</div>':'');}
function getDdayBadge(deadline,status){if(!deadline||status==='Done')return'';var today=new Date();today.setHours(0,0,0,0);var diff=Math.ceil((new Date(deadline)-today)/86400000);if(diff<0)return'<span class="text-[10px] bg-red-500 text-white px-2 py-0.5 r20 font-black">D+'+Math.abs(diff)+'</span>';if(diff===0)return'<span class="text-[10px] bg-red-500 text-white px-2 py-0.5 r20 font-black animate-pulse">D-day</span>';if(diff<=3)return'<span class="text-[10px] bg-orange-400 text-white px-2 py-0.5 r20 font-black">D-'+diff+'</span>';return'<span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 r20 font-bold">D-'+diff+'</span>';}

function renderDevBoardView(data) {

  if(asSel)asSel.innerHTML='<option value="">담당자</option>'+CACHE.members.map(function(m){return'<option value="'+m.email+'">'+m.name+'</option>';}).join('');
  renderDevChecklist(cl,d.id);renderMilestones(ms,d.id);renderSprintTab(d.id);
  var cList=Object.keys(CACHE.comments||{}).map(function(k){return CACHE.comments[k];}).filter(function(c){return c.targetId===d.id;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});

function quickDevStatus(){var id=document.getElementById('dd-id').value,ns=document.getElementById('dp-status').value;var d=CACHE.devProjects.find(function(x){return x.id===id;});if(d)d.status=ns;renderDevProjects();FB.patch('devProjects/'+id,{status:ns});showToast("상태 변경");}

function renderDevChecklist(items,pid){var el=document.getElementById('dev-checklist-container');if(!el)return;if(!items||!items.length){el.innerHTML='<p class="text-xs text-gray-400 font-bold text-center py-2">항목을 추가하세요.</p>';return;}var done=items.filter(function(x){return x.done;}).length,pct=Math.round(done/items.length*100);el.innerHTML='<div class="flex items-center gap-2 mb-3"><div class="flex-1 progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><span class="text-xs font-black text-blue-600">'+done+'/'+items.length+'</span></div>'+items.map(function(item,i){return'<div class="flex items-start gap-3 p-3 bg-gray-50 r20 group hover:bg-gray-100 transition"><input type="checkbox" class="w-4 h-4 rounded accent-blue-600 cursor-pointer shrink-0 mt-0.5" '+(item.done?'checked':'')+' onchange="toggleDevChecklist('+i+',this.checked)"><div class="flex-1 min-w-0"><span class="text-sm font-bold '+(item.done?'line-through text-gray-400':'text-gray-700')+'">'+esc(item.text)+'</span><div class="text-[10px] text-gray-400 mt-0.5">'+(item.createdAt?'생성 '+fmtDT(item.createdAt):'')+(item.done&&item.doneAt?' · 완료 '+fmtDT(item.doneAt):'')+(item.assignee?' · '+getMemberName(item.assignee):'')+'</div></div><button onclick="deleteDevChecklistItem('+i+')" class="opacity-0 group-hover:opacity-100 text-red-400 text-xs transition shrink-0"><i class="ri-delete-bin-line"></i></button></div>';}).join('');}
function addDevChecklistItem(){var input=document.getElementById('dp-new-checklist-item'),asSel=document.getElementById('dp-checklist-assignee');if(!input||!input.value.trim())return;var id=document.getElementById('dd-id').value;var d=CACHE.devProjects.find(function(x){return x.id===id;});if(!d)return;if(!d.checklist)d.checklist=[];d.checklist.push({text:input.value.trim(),done:false,assignee:asSel?asSel.value:'',createdAt:Date.now()});input.value='';renderDevChecklist(d.checklist,id);FB.patch('devProjects/'+id,{checklist:d.checklist});}
function toggleDevChecklist(i,done){var id=document.getElementById('dd-id').value;var d=CACHE.devProjects.find(function(x){return x.id===id;});if(!d||!d.checklist)return;d.checklist[i].done=done;if(done)d.checklist[i].doneAt=Date.now();else delete d.checklist[i].doneAt;renderDevChecklist(d.checklist,id);FB.patch('devProjects/'+id,{checklist:d.checklist});}

function renderMilestones(items,pid){var el=document.getElementById('dev-milestone-container');if(!el)return;var today=new Date().toISOString().slice(0,10);el.innerHTML=(!items||!items.length)?'<p class="text-xs text-gray-400 font-bold text-center py-2">마일스톤을 추가하세요.</p>':items.map(function(m,i){var isLate=!m.doneAt&&m.targetDate&&m.targetDate<today;var isDone=!!m.doneAt;return'<div class="flex items-start gap-3 p-3 '+(isDone?'bg-green-50':isLate?'bg-red-50':'bg-orange-50')+' r20 group"><button onclick="toggleMilestone('+i+')" class="mt-0.5">'+(isDone?'<span class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center shrink-0"><i class="ri-check-line text-white text-xs"></i></span>':isLate?'<span class="w-6 h-6 rounded-full bg-red-400 flex items-center justify-center shrink-0"><i class="ri-error-warning-fill text-white text-xs"></i></span>':'<span class="w-6 h-6 rounded-full border-2 border-orange-300 bg-white shrink-0"></span>')+'</button><div class="flex-1"><p class="text-sm font-black '+(isDone?'line-through text-gray-400':'text-gray-800')+'">'+esc(m.title)+'</p><p class="text-[10px] text-gray-400 mt-0.5">목표: '+(m.targetDate||'-')+(isDone?' · 완료: '+m.doneAt:'')+'</p></div><button onclick="deleteMilestone('+i+')" class="opacity-0 group-hover:opacity-100 text-red-400 text-xs transition shrink-0 mt-0.5"><i class="ri-delete-bin-line"></i></button></div>';}).join('');}
function addMilestoneRow(){var el=document.getElementById('dev-milestone-container');var tmp='ms-tmp-'+Date.now();var row=document.createElement('div');row.id=tmp;row.className='flex items-center gap-2 p-2 bg-yellow-50 r20 border border-yellow-200';row.innerHTML='<input type="text" id="'+tmp+'-t" placeholder="마일스톤명 *" class="flex-1 border p-2.5 r20 text-sm outline-none bg-white focus:border-orange-400"><input type="date" id="'+tmp+'-d" class="border p-2.5 r20 text-sm outline-none bg-white focus:border-orange-400"><button onclick="confirmAddMilestone(\''+tmp+'\')" class="bg-orange-500 text-white px-3 py-2 r20 text-xs font-bold hover:bg-orange-600 transition">저장</button><button onclick="document.getElementById(\''+tmp+'\').remove()" class="text-gray-400 hover:text-red-500"><i class="ri-close-line"></i></button>';el.appendChild(row);document.getElementById(tmp+'-t').focus();}
function confirmAddMilestone(tmp){var title=document.getElementById(tmp+'-t').value.trim(),date=document.getElementById(tmp+'-d').value;if(!title)return showToast("마일스톤명 입력");var id=document.getElementById('dd-id').value;var d=CACHE.devProjects.find(function(x){return x.id===id;});if(!d)return;if(!d.milestones)d.milestones=[];d.milestones.push({title:title,targetDate:date,doneAt:null,createdAt:Date.now()});var tmpEl=document.getElementById(tmp);if(tmpEl)tmpEl.remove();renderMilestones(d.milestones,id);FB.patch('devProjects/'+id,{milestones:d.milestones});}
function toggleMilestone(i){var id=document.getElementById('dd-id').value;var d=CACHE.devProjects.find(function(x){return x.id===id;});if(!d||!d.milestones)return;var m=d.milestones[i];m.doneAt=m.doneAt?null:new Date().toISOString().slice(0,10);renderMilestones(d.milestones,id);FB.patch('devProjects/'+id,{milestones:d.milestones});}
function deleteMilestone(i){var id=document.getElementById('dd-id').value;var d=CACHE.devProjects.find(function(x){return x.id===id;});if(!d||!d.milestones)return;d.milestones.splice(i,1);renderMilestones(d.milestones,id);FB.patch('devProjects/'+id,{milestones:d.milestones});}

function renderSprintTab(pid){var el=document.getElementById('dp-tab-sprint');if(!el)return;var d=CACHE.devProjects.find(function(x){return x.id===pid;});var today=new Date().toISOString().slice(0,10);el.innerHTML='<div class="mb-4 p-4 bg-violet-50 r24 border border-violet-100"><p class="text-xs font-black text-violet-700 mb-1"><i class="ri-rocket-line mr-1"></i> 현재 스프린트</p><p class="text-sm font-black text-gray-800">'+(d&&d.sprintName?d.sprintName:'<span class="text-gray-400">배정 없음</span>')+'</p></div>'+(CACHE.sprints||[]).map(function(s){var isA=s.start<=today&&s.end>=today;return'<div class="flex items-center gap-3 p-3 r20 mb-2 border '+(isA?'border-violet-300 bg-violet-50':'border-gray-100 bg-white')+'"><div class="flex-1"><p class="text-xs font-black text-gray-800">'+esc(s.name)+(isA?' <span class="text-[9px] bg-violet-500 text-white px-1.5 py-0.5 r20 ml-1">진행중</span>':'')+'</p><p class="text-[10px] text-gray-400 font-bold mt-0.5">'+s.start+'~'+s.end+'</p></div><button onclick="assignSprint(\''+pid+'\',\''+esc(s.name)+'\')" class="text-[10px] font-black px-3 py-1.5 r20 '+(d&&d.sprintName===s.name?'bg-violet-500 text-white':'bg-gray-100 text-gray-600 hover:bg-violet-100 hover:text-violet-600')+' transition">'+(d&&d.sprintName===s.name?'✓ 배정됨':'배정')+'</button></div>';}).join('')+'<button onclick="openSprintModal(\''+pid+'\')" class="w-full mt-3 text-xs font-bold text-violet-500 bg-violet-50 hover:bg-violet-100 py-3 r20 transition flex items-center justify-center gap-2 border border-violet-200"><i class="ri-add-line"></i> 새 스프린트</button>';}
function assignSprint(pid,name){var d=CACHE.devProjects.find(function(x){return x.id===pid;});if(!d)return;d.sprintName=(d.sprintName===name?'':name);FB.patch('devProjects/'+pid,{sprintName:d.sprintName});renderSprintTab(pid);renderDevProjects();showToast(d.sprintName?'"'+d.sprintName+'" 배정됨':"스프린트 해제");}
function openSprintModal(pid){renderModalRoot('sprint-modal','<div class="bg-white r35 w-full max-w-sm p-10 shadow-2xl fade-in"><h2 class="text-xl font-black text-violet-700 mb-6"><i class="ri-rocket-line"></i> 새 스프린트</h2><input id="sp-name" type="text" placeholder="스프린트명 *" class="w-full border p-4 r24 mb-4 outline-none font-bold bg-gray-50 focus:border-violet-400 transition"><div class="flex gap-3 mb-8"><div class="flex-1"><label class="block text-xs font-bold text-gray-500 mb-2 pl-2">시작일</label><input id="sp-start" type="date" class="w-full border p-4 r24 outline-none text-sm focus:border-violet-400"></div><div class="flex-1"><label class="block text-xs font-bold text-gray-500 mb-2 pl-2">종료일</label><input id="sp-end" type="date" class="w-full border p-4 r24 outline-none text-sm focus:border-violet-400"></div></div><input type="hidden" id="sp-pid" value="'+pid+'"><div class="flex justify-end gap-3"><button onclick="closeModal(\'sprint-modal\')" class="px-6 py-3.5 bg-gray-100 r35 text-sm font-bold hover:bg-gray-200 transition">취소</button><button onclick="submitSprint()" class="px-6 py-3.5 bg-violet-600 text-white r35 text-sm font-bold shadow-lg hover:bg-violet-700 transition">생성</button></div></div>');openModal('sprint-modal');}
function submitSprint(){var name=document.getElementById('sp-name').value.trim(),start=document.getElementById('sp-start').value,end=document.getElementById('sp-end').value,pid=document.getElementById('sp-pid').value;if(!name||!start||!end)return showToast("모두 입력하세요.");var id='sp_'+genId();var sp={id:id,name:name,start:start,end:end,createdAt:Date.now()};CACHE.sprints.push(sp);FB.set('sprints/'+id,sp);closeModal('sprint-modal');if(pid)openDevDetail(pid);showToast('"'+name+'" 생성 완료!');}

function submitDevProject(){
  var id=document.getElementById('dev-edit-id').value;
  var title=document.getElementById('dev-title').value.trim();if(!title)return showToast("프로젝트명을 입력하세요.");
  var fields={title:title,status:document.getElementById('dev-status').value,progress:Number(document.getElementById('dev-progress').value)||0,start:document.getElementById('dev-start').value,end:document.getElementById('dev-end').value,assignees:getChecked('dev-assignees-container'),note:document.getElementById('dev-note').value,tags:document.getElementById('dev-tags-input').value,priority:document.getElementById('dev-priority-select').value,sprintName:document.getElementById('dev-sprint-select').value};
  var btn=document.getElementById('dev-submit-btn');btn.innerText='처리 중...';btn.disabled=true;
  if(id){var idx=CACHE.devProjects.findIndex(function(x){return x.id===id;});if(idx>-1)Object.assign(CACHE.devProjects[idx],fields);closeModal('dev-modal');btn.innerText='수정 저장';btn.disabled=false;showToast("수정 완료!");renderDevProjects();FB.patch('devProjects/'+id,fields);}
  else{var newId=genId();var obj=Object.assign({id:newId},fields,{milestones:[],checklist:[],creator:USER.email,timestamp:Date.now()});CACHE.devProjects.push(obj);closeModal('dev-modal');btn.innerText='생성';btn.disabled=false;showToast("생성 완료!");renderDevProjects();FB.set('devProjects/'+newId,obj);}
}

    '<div class="flex items-center gap-3">' +

function filterCRM(){initCRMTab();var k=(document.getElementById('crm-search')||{value:''}).value.toLowerCase();renderCRMUI(CACHE.crm.filter(function(c){return(c.company||'').toLowerCase().indexOf(k)>-1||(c.contactName||'').toLowerCase().indexOf(k)>-1;}));}

function renderCRMUI(data){
  var colMap={'잠재고객(Lead)':'col-crm-Lead','연락/미팅(Contact)':'col-crm-Contact','제안/견적(Proposal)':'col-crm-Proposal','계약성공(Won)':'col-crm-Won'};
  Object.values(colMap).forEach(function(id){var el=document.getElementById(id);if(el)el.innerHTML='';});
  data.forEach(function(d){
    var colId=colMap[d.status]||'col-crm-Lead';
    var el=document.getElementById(colId);if(!el)return;

ass="flex-1 overflow-y-auto space-y-3 mb-4 text-xs hide-scrollbar">'+(cList.length?cList.map(function(c){return'<div class="bg-white p-4 r20 shadow-sm border border-gray-100"><div class="flex justify-between mb-1 font-bold text-[10px]"><span>'+c.authorName+'</span><span class="text-gray-400 font-normal">'+c.date+'</span></div><p class="text-xs text-gray-600 whitespace-pre-wrap">'+esc(c.content)+'</p></div>';}).join(''):'<p class="text-xs text-gray-400 font-bold text-center mt-4">활동 기록이 없습니다.</p>')+'</div><div class="mt-auto relative border-t border-gray-200 pt-4"><textarea id="crm-comment-input-'+d.id+'" rows="2" placeholder="미팅 결과, 특이사항..." class="w-full border r20 p-4 pr-14 text-sm outline-none focus:border-emerald-500 resize-none shadow-sm transition"></textarea><button onclick="submitCRMComment(\''+d.id+'\')" class="absolute bottom-4 right-4 bg-emerald-500 text-white w-9 h-9 rounded-full flex items-center justify-center hover:bg-emerald-600 transition"><i class="ri-send-plane-fill text-sm"></i></button></div></div></div>');

function quickCRMStatus(id){var ns=document.getElementById('crm-detail-status').value;var d=CACHE.crm.find(function(x){return x.id===id;});if(d){d.status=ns;filterCRM();}FB.patch('crm/'+id,{status:ns});if(ns==='계약성공(Won)')showToast('🎉 계약 성공!');else showToast("단계 변경");}
function saveCRMNextAction(id){var date=document.getElementById('crm-next-action-'+id).value;var d=CACHE.crm.find(function(x){return x.id===id;});if(d)d.nextActionDate=date;FB.patch('crm/'+id,{nextActionDate:date});showToast("팔로업 일정 저장!");refreshNotifBadge();}
function submitCRMComment(id){var input=document.getElementById('crm-comment-input-'+id);if(!input||!input.value.trim())return;var msg=input.value;input.value='';var cId=genId();var c={targetId:id,email:USER.email,authorName:USER.name,content:msg,date:nowFmt()};CACHE.comments[cId]=c;FB.set('comments/'+cId,c);openCRMDetail(id);}
function renderCRMChecklist(d){var el=document.getElementById('crm-cl-'+d.id);if(!el)return;var items=d.checklist||[];if(!items.length){el.innerHTML='<p class="text-xs text-gray-400 font-bold text-center py-2">업무 항목을 추가하세요.</p>';return;}var done=items.filter(function(x){return x.done;}).length;el.innerHTML='<div class="flex items-center gap-2 mb-2"><div class="flex-1 progress-bar"><div class="progress-fill" style="background:linear-gradient(90deg,#10b981,#059669);width:'+Math.round(done/items.length*100)+'%"></div></div><span class="text-xs font-black text-emerald-600">'+done+'/'+items.length+'</span></div>'+items.map(function(item,i){return'<div class="flex items-center gap-3 p-3 bg-gray-50 r20 group hover:bg-gray-100 transition"><input type="checkbox" class="w-4 h-4 rounded accent-emerald-600 cursor-pointer shrink-0" '+(item.done?'checked':'')+' onchange="toggleCRMChecklist(\''+d.id+'\','+i+',this.checked)"><span class="flex-1 text-xs font-bold '+(item.done?'line-through text-gray-400':'text-gray-700')+'">'+esc(item.text)+'</span>'+(item.assignee?'<span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 r20 font-bold shrink-0">'+getMemberName(item.assignee)+'</span>':'')+'<button onclick="deleteCRMChecklist(\''+d.id+'\','+i+')" class="opacity-0 group-hover:opacity-100 text-red-400 text-xs transition shrink-0"><i class="ri-delete-bin-line"></i></button></div>';}).join('');}
function addCRMChecklist(id){var input=document.getElementById('crm-cl-input-'+id),asSel=document.getElementById('crm-cl-as-'+id);if(!input||!input.value.trim())return;var d=CACHE.crm.find(function(x){return x.id===id;});if(!d)return;if(!d.checklist)d.checklist=[];d.checklist.push({text:input.value.trim(),done:false,assignee:asSel?asSel.value:'',createdAt:Date.now()});input.value='';renderCRMChecklist(d);FB.patch('crm/'+id,{checklist:d.checklist});}
function toggleCRMChecklist(id,i,done){var d=CACHE.crm.find(function(x){return x.id===id;});if(!d||!d.checklist)return;d.checklist[i].done=done;if(done)d.checklist[i].doneAt=Date.now();else delete d.checklist[i].doneAt;renderCRMChecklist(d);FB.patch('crm/'+id,{checklist:d.checklist});}
function deleteCRMChecklist(id,i){var d=CACHE.crm.find(function(x){return x.id===id;});if(!d||!d.checklist)return;d.checklist.splice(i,1);renderCRMChecklist(d);FB.patch('crm/'+id,{checklist:d.checklist});}

x justify-end gap-3 mt-4"><button onclick="confirmDeleteCS(\''+d.id+'\')" class="px-8 py-3.5 bg-red-50 text-red-600 r35 text-sm font-bold hover:bg-red-100 transition">삭제</button></div></div><div class="w-full md:w-[340px] flex flex-col bg-gray-50 r35 p-7 border border-gray-100 min-h-[400px]"><h3 class="font-black text-base mb-5 text-gray-800"><i class="ri-history-line text-orange-500"></i> 처리 내역</h3><div id="cs-comment-list-'+d.id+'" class="flex-1 overflow-y-auto space-y-3 mb-4 text-xs hide-scrollbar">'+(cList.length?cList.map(function(c){return'<div class="bg-white p-4 r20 shadow-sm border border-gray-100"><div class="flex justify-between mb-1 font-bold text-[10px]"><span>'+c.authorName+'</span><span class="text-gray-400 font-normal">'+c.date+'</span></div><p class="text-xs text-gray-600 whitespace-pre-wrap">'+esc(c.content)+'</p></div>';}).join(''):'<p class="text-xs text-gray-400 font-bold text-center mt-4">내역 없음</p>')+'</div><div class="mt-auto relative border-t border-gray-200 pt-4"><textarea id="cs-comment-input-'+d.id+'" rows="2" placeholder="대응 상황 업데이트..." class="w-full border r20 p-4 pr-14 text-sm outline-none focus:border-orange-500 resize-none shadow-sm transition"></textarea><button onclick="submitCSComment(\''+d.id+'\')" class="absolute bottom-4 right-4 bg-orange-500 text-white w-9 h-9 rounded-full flex items-center justify-center hover:bg-orange-600 transition"><i class="ri-send-plane-fill text-sm"></i></button></div></div></div>');openModal('cs-detail-modal');}

function initMonthFilters(){var now=new Date(),y=now.getFullYear(),m=now.getMonth();var os='<option value="all">전체</option>';for(var i=0;i<18;i++){var ty=y,tm=m-i;while(tm<0){tm+=12;ty--;}var v=ty+'-'+pad(tm+1);os+='<option value="'+v+'">'+ty+'년 '+(tm+1)+'월</option>';}['appr-month-filter','leave-month-filter','admin-export-month'].forEach(function(id){var el=document.getElementById(id);if(el){el.innerHTML=os;el.value=y+'-'+pad(m+1);}});}
function matchMonth(d,f){if(f==='all')return true;if(!d)return false;var s=String(d);if(!isNaN(s)&&s.length>10){var dt=new Date(Number(s));s=dt.getFullYear()+'-'+pad(dt.getMonth()+1);}return s.indexOf(f)===0;}

    if((d.approver1||'').toLowerCase()===USER.email||(d.approver2||'').toLowerCase()===USER.email)t2+=c;
  });

ck="closeModal(\'approval-modal\')" class="px-10 py-4 bg-gray-100 text-gray-700 r35 text-sm font-bold hover:bg-gray-200 transition">취소</button><button id="btn-submit-appr" onclick="submitApprovalBulk()" class="px-10 py-4 bg-blue-600 text-white r35 text-sm font-bold shadow-xl hover:bg-blue-700 transition">결재 올리기</button></div></div>');
  openModal('approval-modal');

function toggleUrgency(){var u=document.getElementById('appr-is-urgent').checked;var dateEl=document.getElementById('appr-date');if(dateEl)dateEl.disabled=!u;var warn=document.getElementById('urgent-warning');if(warn)warn.classList.toggle('hidden',!u);}
function addApprItemRow(){var bankOpts='<option value="">은행 선택</option><option>국민은행</option><option>신한은행</option><option>우리은행</option><option>하나은행</option><option>농협은행</option><option>기업은행</option><option>카카오뱅크</option><option>토스뱅크</option><option>기타</option>';var html='<div class="appr-item-row bg-gray-50 border border-gray-100 p-7 r35 mb-5 relative shadow-sm"><button onclick="this.parentElement.remove()" class="absolute top-5 right-5 text-gray-300 hover:text-red-500 transition"><i class="ri-close-circle-fill text-2xl"></i></button><label class="block text-xs font-bold text-gray-500 mb-3 pl-2 uppercase">지출 사유 *</label><div class="flex gap-3 mb-4"><select class="appr-reason-select border p-4 r24 text-sm font-bold outline-none w-1/3 focus:border-blue-500" onchange="var c=this.nextElementSibling;c.classList.remove(\'hidden\');if(this.value===\'\')c.classList.add(\'hidden\');"><option value="">선택</option><option value="식대">식대</option><option value="교통/유류비">교통/유류비</option><option value="사무용품/비품">사무용품</option><option value="기타">기타</option></select><input type="text" class="appr-reason-custom hidden flex-1 border p-4 r24 text-sm outline-none focus:border-blue-500" placeholder="상세 사유"></div><div class="flex gap-3 mb-4"><select class="appr-bank flex-1 border p-4 r24 text-sm font-bold outline-none">'+bankOpts+'</select><input type="text" class="appr-account flex-2 border p-4 r24 text-sm font-bold" placeholder="계좌번호"><input type="number" class="appr-amount flex-1 border p-4 r24 text-base font-black text-green-600" placeholder="금액(원)"></div><label class="block text-xs font-bold text-gray-500 mt-5 mb-3 pl-2 uppercase">영수증 첨부 *</label><label class="flex flex-col items-center justify-center w-full h-28 upload-zone r24 bg-white"><i class="ri-upload-cloud-2-line text-4xl text-blue-400 mb-2"></i><span class="text-xs font-bold text-gray-400 file-name-display">클릭하여 업로드</span><input type="file" class="hidden appr-file" onchange="this.previousElementSibling.innerText=this.files[0].name" function submitApprovalBulk(){
  var a1=document.getElementById('appr-approver1')?document.getElementById('appr-approver1').value:'';
  var a2=document.getElementById('appr-approver2')?document.getElementById('appr-approver2').value:'';
  var date=document.getElementById('appr-date')?document.getElementById('appr-date').value:'';
  if(!a1||!date){showToast("1차 결재권자와 입금일 필수");return;}
  var rows=document.querySelectorAll('.appr-item-row');if(!rows.length){showToast("최소 1항목 필요");return;}
  var valid=true;
  rows.forEach(function(row){var rs=row.querySelector('.appr-reason-select').value,rc=row.querySelector('.appr-reason-custom').value;var reason=rs==='기타'?rc:rs;var bank=row.querySelector('.appr-bank').value,account=row.querySelector('.appr-account').value,amount=row.querySelector('.appr-amount').value;if(!reason||!bank||!account||!amount){showToast("모든 칸 입력 필수");valid=false;}});
  if(!valid)return;
  var btn=document.getElementById('btn-submit-appr');btn.innerText='처리중...';btn.disabled=true;
  rows.forEach(function(row){
    var rs=row.querySelector('.appr-reason-select').value,rc=row.querySelector('.appr-reason-custom').value;
    var reason=rs==='기타'?rc:rs;
    var id=genId();
    var obj={id:id,reason:reason,bank:row.querySelector('.appr-bank').value,account:row.querySelector('.appr-account').value,amount:row.querySelector('.appr-amount').value,approver1:a1,approver2:a2||'',date:date,drafter:USER.email,drafterName:USER.name,status:'대기',dateCreated:Date.now(),fileUrl:''};
    CACHE.approval.push(obj);
    FB.set('approvals/'+id,obj);
  });
  closeModal('approval-modal');btn.innerText='결재 올리기';btn.disabled=false;
  showToast("제출 완료!");updateBadges();renderApproval();
}

  renderModalRoot('approval-detail-modal','<div class="bg-white r35 w-full max-w-2xl p-10 shadow-2xl relative fade-in"><button onclick="closeModal(\'approval-detail-modal\')" class="absolute top-8 right-8 text-gray-400 hover:text-black"><i class="ri-close-line text-3xl"></i></button><h2 class="text-3xl font-black mb-8 border-b pb-6 text-gray-800">지출 결재 상세</h2><div class="grid grid-cols-2 gap-6 text-sm mb-8 bg-gray-50 p-8 r35 border border-gray-100"><div><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">항목</span><span class="font-bold text-gray-800 text-xl">'+esc(d.reason)+'</span></div><div><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">금액</span><span class="font-black text-blue-600 text-2xl">₩'+Number(d.amount).toLocaleString()+'</span></div><div><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">기안자</span><span class="font-bold text-base">'+d.drafterName+'</span></div><div><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">상태</span>'+statusBadge(d.status)+'</div><div class="col-span-2"><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">은행/계좌</span><span class="font-bold text-gray-700 bg-white p-3 r20 inline-block border shadow-sm">'+esc(d.bank)+' '+esc(d.account)+'</span></div>'+(d.rejectReason?'<div class="col-span-2"><span class="text-red-500 font-bold block mb-2 text-xs uppercase">반려 사유</span><span class="bg-red-50 text-red-600 p-4 r20 font-bold block border border-red-100">'+esc(d.rejectReason)+'</span></div>':'')+'</div><div class="flex justify-end gap-3 mt-8 border-t border-gray-100 pt-6">'+btns+'</div></div>');
  openModal('approval-detail-modal');
}

function openLeaveDetail(id){var d=CACHE.leaves.find(function(x){return String(x.id)===String(id);});if(!d)return;var btns='';if((d.applicant||'').toLowerCase()===USER.email&&d.status==='대기')btns='<button onclick="withdrawLeaveAction(\''+d.id+'\')" class="px-8 py-3.5 bg-gray-200 text-gray-700 r35 text-sm font-bold hover:bg-gray-300 transition">신청 철회</button>';else if(d.status==='대기'&&(d.approver1||'').toLowerCase()===USER.email)btns='<button onclick="openRejectModal(\''+d.id+'\',\'leave\')" class="px-8 py-3.5 border border-red-200 text-red-600 r35 text-sm font-bold hover:bg-red-50 transition">반려</button><button onclick="approveLeave(\''+d.id+'\')" class="px-8 py-3.5 bg-purple-600 text-white r35 text-sm font-bold shadow-lg hover:bg-purple-700 transition">승인</button>';renderModalRoot('leave-detail-modal','<div class="bg-white r35 w-full max-w-lg p-10 shadow-2xl relative fade-in"><button onclick="closeModal(\'leave-detail-modal\')" class="absolute top-6 right-6 text-gray-400 hover:text-black"><i class="ri-close-line text-3xl"></i></button><h2 class="text-2xl font-black mb-8 border-b pb-4 text-purple-700">휴가 신청 상세</h2><div class="grid grid-cols-2 gap-6 text-sm mb-8 bg-gray-50 p-8 r24 border border-gray-100"><div><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">신청자</span><span class="font-bold text-gray-800 text-xl">'+d.applicantName+'</span></div><div><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">상태</span>'+statusBadge(d.status)+'</div><div class="col-span-2"><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">일정</span><span class="font-bold text-purple-600 text-lg">'+d.startDate+' ~ '+d.endDate+' ('+d.type+')</span></div><div class="col-span-2"><span class="text-gray-400 font-bold block mb-2 text-xs uppercase">사유</span><span class="text-gray-700 bg-white border p-4 r20 block leading-relaxed">'+esc(d.reason||'없음')+'</span></div></div><div class="flex justify-end gap-3 mt-8 border-t border-gray-100 pt-6">'+btns+'</div></div>');openModal('leave-detail-modal');}
function withdrawLeaveAction(id){openCustomConfirm("휴가 철회","철회하시겠습니까?",function(){var d=CACHE.leaves.find(function(x){return x.id===id;});if(d)d.status='철회';FB.patch('leaves/'+id,{status:'철회'});closeModal('leave-detail-modal');showToast("철회 완료");updateBadges();renderLeaves();});}
function approveLeave(id){var d=CACHE.leaves.find(function(x){return x.id===id;});if(!d)return;openCustomConfirm("휴가 승인","승인할까요?",function(){d.status='승인';FB.patch('leaves/'+id,{status:'승인'});closeModal('leave-detail-modal');showToast("승인 완료");updateBadges();renderLeaves();CACHE.leaveInfo.used+=(d.type==='연차'?1:0.5);CACHE.leaveInfo.remain=CACHE.leaveInfo.total-CACHE.leaveInfo.used;});}

//  조직도

function renderDirectory(){
  var el=document.getElementById('tab-directory');
  if(!el.querySelector('#directory-search-input')){
    el.innerHTML='<div class="flex justify-between items-center mb-8"><h1 class="text-3xl font-black text-gray-800"><i class="ri-group-fill text-teal-600 mr-2"></i> 사내 조직도</h1><div class="relative"><i class="ri-search-line absolute left-4 top-3.5 text-gray-400 text-lg"></i><input type="text" id="directory-search-input" oninput="filterDirectoryUI()" placeholder="이름, 부서, 연락처 검색..." class="pl-12 pr-4 py-3 border border-teal-100 r35 text-sm outline-none w-72 bg-white card-shadow focus:border-teal-500 transition"></div></div><div class="flex flex-col items-center mb-6"><div class="bg-gray-900 text-white r35 px-16 py-8 card-shadow text-center"><p class="text-xs uppercase tracking-widest text-gray-400 mb-2 font-bold">CEO</p><p class="text-3xl font-black">최희진</p></div><div class="w-px h-10 bg-gray-300"></div></div><div class="grid grid-cols-4 gap-8" id="org-grid"></div>';
  }
  filterDirectoryUI();
}
function filterDirectoryUI(){var k=(document.getElementById('directory-search-input')||{value:''}).value.toLowerCase().replace(/-/g,'');var filtered=CACHE.members.filter(function(m){return(m.name||'').toLowerCase().indexOf(k)>-1||(m.dept||'').toLowerCase().indexOf(k)>-1||String(m.phone||'').replace(/-/g,'').indexOf(k)>-1;});var el=document.getElementById('org-grid');if(!el)return;var teams=['개발팀','전략기획팀','운영팀','마케팅팀'];var colors={개발팀:'bg-blue-50 text-blue-700 border-blue-100',전략기획팀:'bg-amber-50 text-amber-700 border-amber-100',운영팀:'bg-emerald-50 text-emerald-700 border-emerald-100',마케팅팀:'bg-purple-50 text-purple-700 border-purple-100'};el.innerHTML=teams.map(function(t){return'<div><div class="'+(colors[t]||'bg-gray-50 text-gray-700 border-gray-100')+' r35 p-4 text-center font-black mb-5 border">'+t+'</div><div class="space-y-4">'+filtered.filter(function(m){return m.dept===t;}).map(function(m){return'<div class="p-5 border r35 bg-white card-shadow flex items-center gap-4 hover:shadow-lg card-hover transition"><div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center font-black text-xl text-gray-700">'+m.name[0]+'</div><div><h3 class="font-black text-base text-gray-800">'+m.name+' <span class="text-[9px] '+(m.role==='ADMIN'?'bg-red-100 text-red-600':'bg-gray-100 text-gray-500')+' px-2 py-1 r20 ml-2 font-bold align-middle">'+m.role+'</span></h3><p class="text-xs text-gray-400 mt-1">'+m.email+'</p><p class="text-xs text-teal-600 font-bold mt-1"><i class="ri-phone-line"></i> '+(m.phone||'-')+'</p></div></div>';}).join('')||'<p class="text-xs text-center py-4 text-gray-400 font-bold">인원 없음</p>'+'</div></div>';}).join('');}

function renderAdmin(){
  var el=document.getElementById('tab-admin');
  if(el.querySelector('#admin-notice-content'))return;
  el.innerHTML='<h1 class="text-3xl font-black text-red-600 mb-8"><i class="ri-settings-3-fill mr-2"></i> 관리자 설정</h1><div class="grid grid-cols-1 md:grid-cols-2 gap-8"><div class="bg-white border-2 border-red-50 p-10 r35 card-shadow"><h2 class="text-xl font-bold text-red-600 mb-5"><i class="ri-megaphone-fill"></i> 팝업 공지 등록</h2><textarea id="admin-notice-content" rows="5" placeholder="공지 내용" class="w-full border p-5 r24 mb-5 outline-none text-sm bg-gray-50 focus:border-red-400 transition"></textarea><button onclick="submitNoticeAdmin()" class="bg-red-600 text-white px-6 py-4 r35 font-bold w-full hover:bg-red-700 shadow-lg transition">전사 팝업 띄우기</button></div><div class="bg-white border p-10 r35 card-shadow"><h2 class="text-xl font-bold text-gray-800 mb-5"><i class="ri-database-2-fill text-blue-600"></i> 데이터 다운로드</h2><select id="admin-export-month" class="w-full border p-4 r24 mb-5 outline-none text-sm font-bold bg-gray-50"></select><div class="flex gap-4"><button onclick="downloadCSVAdmin(\'Approval\')" class="flex-1 bg-gray-800 text-white py-4 r35 text-sm font-bold shadow-md hover:bg-black transition"><i class="ri-bank-card-line"></i> 지출내역</button><button onclick="downloadCSVAdmin(\'Leaves\')" class="flex-1 bg-gray-800 text-white py-4 r35 text-sm font-bold shadow-md hover:bg-black transition"><i class="ri-flight-takeoff-line"></i> 휴가내역</button></div></div></div>';
  initMonthFilters();
}
function submitNoticeAdmin(){var c=document.getElementById('admin-notice-content').value;if(!c)return showToast("내용을 입력하세요.");var id=genId();FB.set('notices/'+id,{id:id,content:c,createdAt:Date.now(),createdBy:USER.email});showToast("공지 등록 완료!");}
function downloadCSVAdmin(type){
  var month=document.getElementById('admin-export-month')?document.getElementById('admin-export-month').value:'all';
  var csv='\uFEFF';
  if(type==='Approval'){csv+="입금요청일,기안자,항목명,은행,계좌번호,금액,상태\n";CACHE.approval.filter(function(a){return matchMonth(a.dateCreated,month);}).forEach(function(a){csv+='"'+(a.date||'')+'","'+(a.drafterName||'')+'","'+(a.reason||'')+'","'+(a.bank||'')+'","'+(a.account||'')+'","'+(a.amount||0)+'","'+(a.status||'')+'"\n';});}
  else{csv+="신청자,시작일,종료일,구분,사유,상태\n";CACHE.leaves.filter(function(l){return matchMonth(l.startDate,month);}).forEach(function(l){csv+='"'+(l.applicantName||'')+'","'+(l.startDate||'')+'","'+(l.endDate||'')+'","'+(l.type||'')+'","'+(l.reason||'')+'","'+(l.status||'')+'"\n';});}
  var b=new Blob([csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=type+'_'+(month==='all'?'All':month)+'.csv';a.click();
}
</script>
