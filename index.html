<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Labs Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body{font-family:'Inter',sans-serif;color:#37352F;background:#f3f4f6;margin:0}
    .r35{border-radius:35px!important} .r24{border-radius:24px!important} .r20{border-radius:20px!important}
    .card-shadow{box-shadow:0 10px 25px -5px rgba(0,0,0,.05)}
    .card-hover:hover{transform:translateY(-3px);box-shadow:0 20px 25px -5px rgba(0,0,0,.1);transition:all .3s ease}
    .sidebar-item{transition:all .2s;cursor:pointer} .sidebar-item:hover{background:#ebebeb} .sidebar-item.active{background:#fff;font-weight:700;box-shadow:0 4px 6px rgba(0,0,0,.05)}
    .modal-overlay{background:rgba(0,0,0,.5);backdrop-filter:blur(8px);position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center}
    .fade-in{animation:fadeIn .3s ease-out} @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .toast-show{opacity:1!important;transform:translate(-50%,0)!important}
    .upload-zone{border:2px dashed #9CA3AF;transition:.3s;cursor:pointer;background:#f9fafb} .upload-zone:hover{background:#F3F4F6;border-color:#3B82F6}
    .progress-bar{height:8px;border-radius:99px;background:#e5e7eb;overflow:hidden}
    .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#3b82f6,#6366f1);transition:width .4s ease}
  </style>
</head>
<body>

<div id="login-screen" class="hidden fixed inset-0 bg-gradient-to-br from-indigo-900 to-blue-800 flex items-center justify-center z-[200]">
  <div class="bg-white r35 p-16 shadow-2xl text-center w-full max-w-sm fade-in">
    <img src="https://i.imgur.com/gzXQ8nD.png" alt="Logo" class="h-12 mx-auto mb-8 object-contain">
    <h1 class="text-2xl font-black text-gray-800 mb-2">Circular Labs</h1>
    <p class="text-sm text-gray-400 mb-10">워크스페이스 로그인</p>
    <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-blue-400 text-gray-700 font-bold py-4 r24 transition shadow-sm">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Google 계정으로 로그인
    </button>
    <p id="login-error" class="text-red-500 text-xs font-bold mt-4 hidden">권한이 없습니다.</p>
  </div>
</div>

<div id="toast-msg" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 translate-y-4 bg-gray-900 text-white px-8 py-4 r35 shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-[100] font-bold text-sm flex items-center gap-3">
  <i class="ri-notification-3-line text-xl"></i><span id="toast-text"></span>
</div>

<div id="app" class="hidden flex h-screen overflow-hidden">
  <aside class="w-72 bg-[#fbfbfa] border-r border-gray-200 flex flex-col p-6 z-10 overflow-y-auto flex-shrink-0">
    <div class="flex items-center justify-center mb-10 h-12">
      <img src="https://i.imgur.com/gzXQ8nD.png" alt="Logo" class="h-full object-contain max-w-full">
    </div>
    <nav id="sidebar-nav" class="flex-1 space-y-2 text-sm font-medium text-gray-600">
      <div onclick="showTab('home')" data-tab="home" class="sidebar-item flex items-center gap-4 p-3.5 r24 active"><i class="ri-home-smile-2-fill text-xl"></i> 대시보드</div>
      <div onclick="showTab('calendar')" data-tab="calendar" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-rose-600"><i class="ri-calendar-todo-fill text-xl"></i> 일정 및 할 일</div>
      <div onclick="showTab('dev')" data-tab="dev" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-blue-600"><i class="ri-macbook-fill text-xl"></i> 개발 프로젝트</div>
      <div onclick="showTab('crm')" data-tab="crm" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-emerald-600"><i class="ri-briefcase-4-fill text-xl"></i> 영업 파이프라인</div>
      <div onclick="showTab('cs')" data-tab="cs" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-orange-500"><i class="ri-customer-service-2-fill text-xl"></i> CS 고객지원</div>
      <div onclick="showTab('approval')" data-tab="approval" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-gray-800"><i class="ri-bank-card-fill text-xl"></i> 지출/결재 <span id="badge-appr" class="sidebar-badge hidden">0</span></div>
      <div onclick="showTab('vault')" data-tab="vault" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-amber-600"><i class="ri-shield-keyhole-fill text-xl"></i> 팀 보안 금고</div>
      <div onclick="showTab('wiki')" data-tab="wiki" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-gray-800"><i class="ri-book-read-fill text-xl"></i> 사내 위키</div>
      <div onclick="showTab('leaves')" data-tab="leaves" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-purple-600"><i class="ri-flight-takeoff-fill text-xl"></i> 휴가/근태 <span id="badge-leave" class="sidebar-badge hidden">0</span></div>
      <div onclick="showTab('directory')" data-tab="directory" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-teal-600"><i class="ri-group-fill text-xl"></i> 조직도</div>
      <div id="admin-menu" class="hidden"><div class="my-3 border-t"></div><div onclick="showTab('admin')" data-tab="admin" class="sidebar-item flex items-center gap-4 p-3.5 r24 text-red-600"><i class="ri-settings-3-fill text-xl"></i> 관리자 설정</div></div>
    </nav>
    <div class="mt-6 p-5 bg-white r24 card-shadow text-xs">
      <div class="font-black text-sm mb-1 text-gray-800" id="sidebar-name"></div>
      <div class="text-gray-400 truncate mb-3" id="sidebar-email"></div>
      <button onclick="signOut()" class="w-full bg-gray-50 hover:text-red-600 transition p-3 r20 border text-gray-500 font-bold">로그아웃</button>
    </div>
  </aside>

  <main id="content" class="flex-1 overflow-y-auto bg-[#f3f4f6] p-8 relative hide-scrollbar">
    <div id="tab-home" class="fade-in max-w-6xl mx-auto"></div>
    <div id="tab-calendar" class="fade-in max-w-7xl mx-auto hidden h-full flex flex-col"></div>
    <div id="tab-dev" class="fade-in max-w-7xl mx-auto hidden flex flex-col h-full"></div>
    <div id="tab-crm" class="fade-in max-w-7xl mx-auto hidden flex flex-col h-full"></div>
    <div id="tab-cs" class="fade-in max-w-7xl mx-auto hidden flex flex-col h-full"></div>
    <div id="tab-approval" class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-vault" class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-wiki" class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-leaves" class="fade-in max-w-5xl mx-auto hidden"></div>
    <div id="tab-directory" class="fade-in max-w-6xl mx-auto hidden"></div>
    <div id="tab-admin" class="fade-in max-w-5xl mx-auto hidden"></div>
  </main>
</div>

<div id="modal-root"></div>

<script>
// --- FIREBASE CONFIG (기존 값 유지) ---
var firebaseConfig = {
  apiKey: "AIzaSyCmeGcCHO5K-jKu4UApMo_CxLhhDuzVLlc",
  authDomain: "circularlabs-gw.firebaseapp.com",
  databaseURL: "https://circularlabs-gw-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "circularlabs-gw",
  storageBucket: "circularlabs-gw.firebasestorage.app",
  messagingSenderId: "995341939477",
  appId: "1:995341939477:web:543ebebe0a2af4ca14ef1c"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth(); var db = firebase.database(); var USER = null;
var CACHE = { tasks:[], devProjects:[], crm:[], cs:[], schedules:[], approval:[], leaves:[], vault:[], comments:{}, members:[], wiki:[], leaveInfo:{} };

// --- CORE UTILS ---
function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function nowFmt() { var d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours()+':'+d.getMinutes(); }
function showToast(msg) { var t=document.getElementById('toast-msg'); document.getElementById('toast-text').innerText=msg; t.classList.add('toast-show'); setTimeout(()=>t.classList.remove('toast-show'),3000); }
function openModal(id) { var e=document.getElementById(id); if(e) e.classList.remove('hidden'); }
function closeModal(id) { var e=document.getElementById(id); if(e) e.classList.add('hidden'); }

// --- AUTH ---
auth.onAuthStateChanged(firebaseUser => {
  if(firebaseUser) {
    db.ref('members').once('value', snap => {
      var mData = snap.val(); var memberList = mData ? Object.keys(mData).map(k=>({...mData[k], id:k})) : [];
      var matched = memberList.find(m => m.email && m.email.toLowerCase() === firebaseUser.email.toLowerCase());
      if(matched) {
        USER = { email: firebaseUser.email, name: matched.name, role: matched.role, dept: matched.dept, leaveTotal: matched.leaveTotal };
        CACHE.members = memberList;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('sidebar-name').innerText = USER.name;
        document.getElementById('sidebar-email').innerText = USER.email;
        if(USER.role==='ADMIN') document.getElementById('admin-menu').classList.remove('hidden');
        initApp();
      } else {
        document.getElementById('login-error').classList.remove('hidden');
        auth.signOut();
      }
    });
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

document.getElementById('google-login-btn').onclick = () => {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
};
function signOut() { auth.signOut(); }

// --- INITIAL LOAD ---
function initApp() {
  db.ref().once('value', snap => {
    var data = snap.val() || {};
    CACHE.tasks = data.tasks ? Object.keys(data.tasks).map(k=>({...data.tasks[k], id:k})) : [];
    CACHE.devProjects = data.devProjects ? Object.keys(data.devProjects).map(k=>({...data.devProjects[k], id:k})) : [];
    CACHE.crm = data.crm ? Object.keys(data.crm).map(k=>({...data.crm[k], id:k})) : [];
    CACHE.cs = data.cs ? Object.keys(data.cs).map(k=>({...data.cs[k], id:k})) : [];
    CACHE.schedules = data.schedules ? Object.keys(data.schedules).map(k=>({...data.schedules[k], id:k})) : [];
    CACHE.approval = data.approvals ? Object.keys(data.approvals).map(k=>({...data.approvals[k], id:k})) : [];
    CACHE.leaves = data.leaves ? Object.keys(data.leaves).map(k=>({...data.leaves[k], id:k})) : [];
    CACHE.vault = data.vault ? Object.keys(data.vault).map(k=>({...data.vault[k], id:k})) : [];
    CACHE.comments = data.comments || {};
    CACHE.wiki = data.wiki ? Object.keys(data.wiki).map(k=>({...data.wiki[k], id:k})) : [];
    
    // Vault filter
    CACHE.vault = CACHE.vault.filter(v => USER.role==='ADMIN' || v.creator===USER.email || v.visibility==='ALL');
    
    showTab('home');
    updateBadges();
  });
}

function updateBadges() {
  var ac=CACHE.approval.filter(d => ((d.approver1||'').toLowerCase()===USER.email&&d.status==='대기')||((d.approver2||'').toLowerCase()===USER.email&&d.status==='1차 승인')).length;
  var bA=document.getElementById('badge-appr'); if(bA){bA.innerText=ac; bA.classList.toggle('hidden',ac===0);}
}

// --- TABS ---
function showTab(name) {
  document.querySelectorAll('[id^="tab-"]').forEach(s=>s.classList.add('hidden'));
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  var nav=document.querySelector(`[data-tab="${name}"]`); if(nav) nav.classList.add('active');
  
  if(name==='home') renderDashboard();
  if(name==='calendar') renderCalendar();
  if(name==='dev') renderDev();
  if(name==='crm') renderCRM();
  if(name==='vault') renderVault();
}

function renderDashboard() {
  document.getElementById('tab-home').innerHTML = `<h1 class="text-4xl font-black text-gray-800 mb-8">대시보드</h1><div class="grid grid-cols-3 gap-8"><div class="bg-white p-8 r35 card-shadow">고객사 ${CACHE.crm.length}개</div><div class="bg-white p-8 r35 card-shadow">진행 프로젝트 ${CACHE.devProjects.length}개</div><div class="bg-white p-8 r35 card-shadow">결재대기 ${CACHE.approval.filter(a=>a.status==='대기').length}건</div></div>`;
}

function renderCalendar() {
  var el=document.getElementById('tab-calendar');
  el.innerHTML = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-black text-gray-800">일정 및 할 일</h1><button onclick="openScheduleModal()" class="bg-rose-500 text-white px-8 py-3 r35 text-sm font-bold shadow-lg">+ 일정 등록</button></div><div id="main-calendar" class="bg-white p-8 r35 card-shadow flex-1"></div>`;
  if(calendarObj) calendarObj.destroy();
  calendarObj = new FullCalendar.Calendar(document.getElementById('main-calendar'), { initialView: 'dayGridMonth', height: '100%', locale:'ko', events: CACHE.schedules.map(s=>({title:s.title, start:s.start, end:s.end, color: '#f43f5e'})) });
  calendarObj.render();
}

function renderDev() {
  var el=document.getElementById('tab-dev');
  el.innerHTML = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-black text-gray-800">개발 프로젝트</h1><button onclick="openDevModal()" class="bg-blue-600 text-white px-8 py-3 r35 text-sm font-bold shadow-lg">+ 새 프로젝트</button></div><div id="dev-list-body" class="bg-white p-8 r35 card-shadow overflow-y-auto flex-1"></div>`;
  var list = document.getElementById('dev-list-body');
  list.innerHTML = CACHE.devProjects.length === 0 ? '<p class="text-center py-20 text-gray-400">등록된 프로젝트가 없습니다.</p>' : CACHE.devProjects.map(p => `<div onclick="openDevDetail('${p.id}')" class="p-6 border-b hover:bg-blue-50 cursor-pointer flex justify-between items-center"><span class="font-black text-lg">${esc(p.title)}</span><span class="badge badge-pending">${p.status}</span></div>`).join('');
}

function renderCRM() {
  var el=document.getElementById('tab-crm');
  el.innerHTML = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-black text-gray-800">영업 파이프라인</h1><button onclick="openCRMModal()" class="bg-emerald-500 text-white px-8 py-3 r35 text-sm font-bold shadow-lg">+ 리드 등록</button></div><div class="flex gap-6 flex-1 h-0"><div id="col-Lead" class="flex-1 kanban-column">Lead</div><div id="col-Won" class="flex-1 kanban-column bg-emerald-50">Won</div></div>`;
  // (CRM 렌더링 로직 추가...)
}

function renderVault() {
  var el=document.getElementById('tab-vault');
  el.innerHTML = `<div class="mb-8 flex justify-between items-center"><h1 class="text-3xl font-black text-gray-800">보안 금고</h1><input type="text" id="vault-search" oninput="filterVaultUI()" placeholder="검색..." class="p-3 r24 border w-64"></div><div id="vault-grid" class="grid grid-cols-3 gap-6"></div>`;
  filterVaultUI();
}
function filterVaultUI() {
  var k = document.getElementById('vault-search').value.toLowerCase();
  var filtered = CACHE.vault.filter(v => (v.category||'').toLowerCase().includes(k) || (v.note||'').toLowerCase().includes(k));
  document.getElementById('vault-grid').innerHTML = filtered.map(v => `<div class="bg-white p-8 r35 card-shadow font-black">${esc(v.category)}</div>`).join('');
}

// --- MODAL UTILS ---
function renderModalRoot(id, html) {
  var el=document.getElementById(id); if(!el){ el=document.createElement('div'); el.id=id; document.getElementById('modal-root').appendChild(el); }
  el.className='hidden fixed inset-0 modal-overlay p-4 z-50'; el.innerHTML=html;
}

function openScheduleModal() {
  renderModalRoot('schedule-modal', `<div class="bg-white r35 w-full max-w-md p-10 shadow-2xl fade-in"><h2 class="text-2xl font-black text-rose-600 mb-8">새 일정 등록</h2><input id="sch-title" placeholder="제목" class="w-full p-4 border r24 mb-4"><input id="sch-start" type="date" class="w-full p-4 border r24 mb-6"><div class="flex gap-3"><button onclick="closeModal('schedule-modal')" class="flex-1 py-4 bg-gray-100 r35 font-bold">취소</button><button onclick="submitSchedule()" class="flex-1 py-4 bg-rose-600 text-white r35 font-bold shadow-lg">등록</button></div></div>`);
  openModal('schedule-modal');
}
function submitSchedule() {
  var t=document.getElementById('sch-title').value, s=document.getElementById('sch-start').value; if(!t||!s) return;
  var obj={id:genId(), title:t, start:s, creator:USER.email}; CACHE.schedules.push(obj); FB.set('schedules/'+obj.id, obj); closeModal('schedule-modal'); renderCalendar();
}

function openDevModal() {
  renderModalRoot('dev-modal', `<div class="bg-white r35 w-full max-w-md p-10 shadow-2xl fade-in"><h2 class="text-2xl font-black text-blue-600 mb-8">새 프로젝트 생성</h2><input id="dev-title" placeholder="프로젝트명" class="w-full p-4 border r24 mb-4"><div class="flex gap-3"><button onclick="closeModal('dev-modal')" class="flex-1 py-4 bg-gray-100 r35 font-bold">취소</button><button onclick="submitDevProject()" class="flex-1 py-4 bg-blue-600 text-white r35 font-bold shadow-lg">생성</button></div></div>`);
  openModal('dev-modal');
}
function submitDevProject() {
  var t=document.getElementById('dev-title').value; if(!t) return;
  var obj={id:genId(), title:t, status:'기획중', progress:0, timestamp:Date.now()}; CACHE.devProjects.push(obj); FB.set('devProjects/'+obj.id, obj); closeModal('dev-modal'); renderDev();
}
</script>
</body>
</html>
